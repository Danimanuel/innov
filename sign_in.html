<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilo/signin.css">
    <title>Sign in</title>
</head>

<body>
    <div class="interface">

        <div class="sign">
            <section class="fm">
                <h2>Sign in</h2>
                <form id="formCadastro" action="php/saved.php" method="post">
                    <label for="user">Fullname</label> <br>
                    <input type="text" name="fullname" id="user" required> <br>
                    <label for="email">Emai:</label> <br>
                    <input type="email" name="email" id="email" required> <br>
                    <label for="date">Date of Birth</label>
                    <br>
                    <input type="date" name="birthday" id="date"><br>
                    <fieldset>
                        <legend>Gender</legend>
                        <input type="radio" name="gender" id="male" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" name="gender" id="female" value="female" required>
                        <label for="female">Female</label>
                    </fieldset>
                    <label for="password">Password</label><br>
                    <input type="password" name="pass" id="password" required>
                    <br>
                    <label for="pass">Confirm your Password</label><br>
                    <input type="password" name="confirm_password" id="pass" required>
                    <button type="submit" class="btn">Cadastrar</button>
                </form>

                <div id="mensagem"></div>

                <script>
                    // Vamos usar AJAX para enviar o formulário e receber a mensagem
                    const form = document.getElementById("formCadastro");
                    const mensagemDiv = document.getElementById("mensagem");

                    form.addEventListener("submit", function (e) {
                        e.preventDefault(); // evita recarregar a página

                        const formData = new FormData(form);

                        fetch("php/saved.php", {
                            method: "POST",
                            body: formData
                        })
                            .then(response => response.json())
                            .then(data => {
                                mensagemDiv.innerHTML = data.mensagem; // mostra a mensagem
                                if (data.sucesso) {
                                    // se cadastro OK, redireciona para info-adicional
                                    window.location.href = "saved_addinfo.php?id=" + data.id_usuario;
                                }
                            })
                            .catch(err => console.log(err));
                    });
                </script>
            </section>
        </div>
        <footer>
            <p>&copy; innov. Todos os direitos reservados.</p>
        </footer>
    </div>
</body>

</html>
