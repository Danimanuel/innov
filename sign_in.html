<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilo/signin.css">
    <title>Sign in</title>
</head>

<body>
<div class="interface">

    <div class="sign">
        <section class="fm">
            <h2>Sign in</h2>

        
            <form id="formCadastro">

                <label>Fullname</label><br>
                <input type="text" name="fullname" required><br>

                <label>Email:</label><br>
                <input type="email" name="email" required><br>

                <label>Date of Birth</label><br>
                <input type="date" name="birthday"><br>

                <fieldset>
                    <legend>Gender</legend>
                    <input type="radio" name="gender" value="male" required> Male
                    <input type="radio" name="gender" value="female" required> Female
                </fieldset>

                <label>Password</label><br>
                <input type="password" name="pass" required><br>

                <label>Confirm your Password</label><br>
                <input type="password" name="confirm_password" required><br>
                 <div id="mensagem"></div>
                <button type="submit" class="btn">Cadastrar</button>
            </form>

           

        </section>
    </div>

    <footer>
        <p>&copy; innov. Todos os direitos reservados.</p>
    </footer>

</div>

<script>
const form = document.getElementById("formCadastro");
const mensagemDiv = document.getElementById("mensagem");

form.addEventListener("submit", function (e) {
    e.preventDefault();

    const formData = new FormData(form);

    const pass = formData.get("pass");
    const confirm = formData.get("confirm_password");

    if (pass !== confirm) {
        mensagemDiv.innerHTML = "<p style='color:red;'>As senhas não coincidem!</p>";
        return;
    }

    fetch("php/saved.php", {
        method: "POST",
        body: formData
    })
    .then(response => {
        return response.json();   
    })
    .then(data => {

        if (data.sucesso) {
            mensagemDiv.innerHTML = "<p style='color:green;'>" + data.mensagem + "</p>";

            setTimeout(() => {
                window.location.href = "php/addinfo.php?id=" + data.id_usuario;
            }, 1000);

        } else {
            mensagemDiv.innerHTML = "<p style='color:red;'>" + data.mensagem + "</p>";
        }

    })
    .catch(error => {
        console.log("Erro real:", error);
        mensagemDiv.innerHTML = "<p style='color:red;'>Erro no servidor.</p>";
    });
});
</script>
</body>
</html>
